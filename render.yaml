# =====================================================
# Render Blueprint — Kalapak Code Team Website
# =====================================================
# Deploy: Go to https://render.com → New → Blueprint
# Connect your GitHub repo and Render will auto-detect this file.
#
# After first deploy, update these in the Render dashboard:
#   Backend → APP_URL = https://kalapak-backend.onrender.com
#   Backend → FRONTEND_URL = https://kalapak-frontend.onrender.com
#   Backend → SANCTUM_STATEFUL_DOMAINS = kalapak-frontend.onrender.com
#   Frontend → BACKEND_URL = https://kalapak-backend.onrender.com
# =====================================================

services:
  # -------------------------------------------------
  # Backend — Laravel 11 API
  # -------------------------------------------------
  - type: web
    name: kalapak-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: APP_NAME
        value: "Kalapak Code Team"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      # Run Laravel migrations on each deploy so new tables/columns exist (e.g. series, collections).
      - key: RUN_MIGRATIONS
        value: "1"
      - key: APP_URL
        value: https://kalapak-backend.onrender.com
      - key: FRONTEND_URL
        value: https://kalapak-frontend.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: kalapak-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: kalapak-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: kalapak-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: kalapak-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: kalapak-db
          property: password
      - key: SANCTUM_STATEFUL_DOMAINS
        value: kalapak-frontend.onrender.com
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: local
      # ── Upstash Redis ──
      - key: REDIS_CLIENT
        value: predis
      - key: REDIS_SCHEME
        value: tls
      - key: REDIS_HOST
        value: living-tadpole-83117.upstash.io
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false # Set in Render dashboard
      - key: CACHE_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: TURNSTILE_SECRET_KEY
        sync: false # Set manually: get from Cloudflare Dashboard → Turnstile → your site → Secret Key
      # ── Mail (required for Forgot Password emails) ──
      # Use Resend (resend.com), Mailgun, or any SMTP provider
      - key: MAIL_MAILER
        sync: false # e.g. smtp
      - key: MAIL_HOST
        sync: false # e.g. smtp.resend.com  or smtp.mailgun.org
      - key: MAIL_PORT
        sync: false # e.g. 587
      - key: MAIL_USERNAME
        sync: false # e.g. resend (for Resend) or your Mailgun username
      - key: MAIL_PASSWORD
        sync: false # your SMTP API key / password
      - key: MAIL_ENCRYPTION
        sync: false # tls
      - key: MAIL_FROM_ADDRESS
        sync: false # e.g. noreply@yourdomain.com
      - key: MAIL_FROM_NAME
        value: "Kalapak Code Team"
      - key: CLOUDINARY_URL
        sync: false # Set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ENDPOINT
        sync: false
      - key: SUPABASE_ACCESS_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: SUPABASE_REGION
        sync: false

  # -------------------------------------------------
  # Frontend — Vue 3 + Nginx (production build)
  # -------------------------------------------------
  - type: web
    name: kalapak-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NUXT_PUBLIC_API_URL
        value: https://kalapak-backend.onrender.com/api
      - key: NUXT_PUBLIC_SITE_URL
        value: https://kalapak-frontend.onrender.com

# -------------------------------------------------
# PostgreSQL Database
# -------------------------------------------------
databases:
  - name: kalapak-db
    plan: free
    databaseName: kalapak_db
    user: kalapak_user
